name: Deploy to GitHub Pages

# main 브랜치 push 시: 테스트 → 빌드 → GitHub Pages 배포.
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한(OIDC 토큰 포함).
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않게 직렬화(진행 중인 실행은 취소하지 않음).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
